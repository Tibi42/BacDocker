name: bac

services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    volumes:
      - .:/app
      - vendor_data:/app/vendor
    depends_on:
      database:
        condition: service_healthy
    env_file:
      - path: .env.docker.local
        required: false
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_DEBUG: ${APP_DEBUG:-1}
      APP_SECRET: ${APP_SECRET:-change_me_in_env_docker_local}
      DATABASE_URL: "mysql://${MYSQL_USER:-app}:${MYSQL_PASSWORD:-changeme}@database:3306/${MYSQL_DATABASE:-bacbdd}?serverVersion=8.0&charset=utf8mb4"
      MAILER_DSN: ${MAILER_DSN:-smtp://mailer:1025}
      MAILER_FROM: ${MAILER_FROM:-boiteachimere@guillaumepecquet.ovh}
      MAILER_FROM_NAME: ${MAILER_FROM_NAME:-La Boîte à Chimère}
      DEFAULT_URI: ${DEFAULT_URI:-http://localhost:8080}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-0}
      XDEBUG_MODE: ${XDEBUG_MODE:-off}
      XDEBUG_CONFIG: ${XDEBUG_CONFIG:-client_host=host.docker.internal}
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/app/public:ro
    depends_on:
      - php
    restart: unless-stopped

  database:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-bacbdd}
      MYSQL_USER: ${MYSQL_USER:-app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-changeme}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped

  mailer:
    image: axllent/mailpit
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "127.0.0.1:8081:80"
    environment:
      PMA_HOST: database
      PMA_USER: ${MYSQL_USER:-app}
      PMA_PASSWORD: ${MYSQL_PASSWORD:-changeme}
    depends_on:
      - database
    restart: unless-stopped

volumes:
  db_data:
  vendor_data:
