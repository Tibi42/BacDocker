# Vhost Nginx — guillaumepecquet.ovh
# Installer : /etc/nginx/sites-available/guillaumepecquet.ovh
# Activer  : ln -s /etc/nginx/sites-available/guillaumepecquet.ovh /etc/nginx/sites-enabled/
# Puis     : certbot --nginx -d guillaumepecquet.ovh -d www.guillaumepecquet.ovh
#
# Adapter le chemin si le clone n'est pas dans /var/www/laboiteachimere

server {
    listen 80;
    listen [::]:80;
    server_name guillaumepecquet.ovh www.guillaumepecquet.ovh;

    root /var/www/laboiteachimere/public;
    index index.php;

    charset utf-8;
    client_max_body_size 8M;

    # Compression (Ubuntu désactive gzip par défaut dans nginx.conf : on le
    # réactive ici pour ce vhost). Le CSS Tailwind (~75 Kio non compressé)
    # tombe à ~12 Kio en gzip — impact direct sur le CSS bloquant le rendu.
    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/vnd.ms-fontobject
        font/truetype
        font/opentype
        image/svg+xml;

    # Logs
    access_log /var/log/nginx/guillaumepecquet.ovh.access.log;
    error_log  /var/log/nginx/guillaumepecquet.ovh.error.log;

    # Interdit l’accès aux fichiers cachés / sensibles hors public
    location ~ /\. {
        deny all;
    }

    location / {
        try_files $uri /index.php$is_args$args;
    }

    # Assets compilés AssetMapper / images
    location ~* \.(css|js|mjs|map|jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
        access_log off;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_buffer_size 32k;
        fastcgi_buffers 8 16k;
        internal;
    }

    # Bloque tout autre .php
    location ~ \.php$ {
        return 404;
    }
}
